name: Discover Consumers

on:
  workflow_dispatch:
    inputs:
      company:
        description: 'Company name to discover for (leave blank for all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Discover and register new consumers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRIFTABOT_TOKEN: ${{ secrets.DRIFTABOT_TOKEN }}
        run: |
          COMPANY="${{ github.event.inputs.company }}"
          if [ -n "$COMPANY" ]; then
            python -m checker --discover --company "$COMPANY"
          else
            python -m checker --discover
          fi

      - name: Commit updated registry and issue logs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "driftabot-crawler[bot]"
          git config user.email "crawler@driftabot.dev"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/DriftaBot/registry.git"
          git add consumer.companies.yaml companies/consumers/
          if git diff --staged --quiet; then
            echo "No new consumers discovered."
          else
            git commit -m "chore: discover consumers $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase
            git push
          fi
